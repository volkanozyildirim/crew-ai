<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agile SDLC Crew - Modern Office Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg-card: #1a1d27;
  --bg-elevated: #242736;
  --border: #2e3247;
  --accent: #6c5ce7;
  --accent-light: #a29bfe;
  --success: #00b894;
  --warning: #fdcb6e;
  --danger: #e17055;
  --text: #f0f0f5;
  --text-dim: #8b8fa3;
  --working-glow: rgba(108,92,231,0.4);
  --success-glow: rgba(0,184,148,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

/* ── Header ── */
header {
  background: linear-gradient(135deg, #1a1d27 0%, #242736 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display:flex; align-items:center; gap:12px; }
.logo-icon {
  width:40px; height:40px; border-radius:10px;
  background: linear-gradient(135deg, var(--accent), #e17055);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:800; color:white;
}
.logo h1 { font-size:18px; font-weight:700; letter-spacing:-0.5px; }
.logo .sub { font-size:11px; color:var(--text-dim); font-weight:400; }
.header-badge {
  background:var(--accent); color:white; padding:6px 16px;
  border-radius:20px; font-size:12px; font-weight:600;
}
.header-right { display:flex; align-items:center; gap:16px; }
.header-time { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-dim); }
.settings-btn {
  background:var(--bg-elevated); border:1px solid var(--border);
  color:var(--text); padding:6px 14px; border-radius:8px;
  font-size:12px; cursor:pointer; font-family:'Inter',sans-serif;
  transition: all 0.2s;
}
.settings-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── Progress ── */
.progress-section {
  padding:12px 24px; background:var(--bg-card);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:20px;
}
.progress-bar-wrap { flex:1; }
.progress-bar-outer {
  background:var(--bg); height:8px; border-radius:4px; overflow:hidden;
}
.progress-bar-inner {
  height:100%; border-radius:4px;
  background:linear-gradient(90deg, var(--accent), var(--success));
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  position:relative;
}
.progress-bar-inner::after {
  content:''; position:absolute; top:0;right:0;bottom:0;left:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  animation:shimmer 2s infinite;
}
@keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
.progress-label { font-size:12px; color:var(--text-dim); white-space:nowrap; }
.progress-pct { font-size:14px; font-weight:700; color:var(--accent-light); min-width:45px; text-align:right; }

/* ── Main Layout ── */
.main { display:grid; grid-template-columns:1fr 320px; min-height:calc(100vh - 110px); }

/* ── Office Scene ── */
.office-scene {
  padding:20px; position:relative;
  background:
    radial-gradient(ellipse at 50% 120%, rgba(108,92,231,0.06) 0%, transparent 60%),
    var(--bg);
}
.office-scene h2 { font-size:13px; color:var(--text-dim); font-weight:600; margin-bottom:16px; text-transform:uppercase; letter-spacing:1px; }

/* Office Floor */
.office-floor {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  min-height: 420px;
  position: relative;
  overflow: hidden;
}
.office-floor::before {
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--success),var(--warning),var(--danger));
  border-radius:16px 16px 0 0;
}

/* Desk Grid */
.desk-grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top:8px;
}

/* Agent Desk */
.agent-desk {
  background:var(--bg-elevated);
  border:2px solid var(--border);
  border-radius:12px;
  padding:16px;
  position:relative;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  cursor:default;
  min-height: 170px;
}
.agent-desk:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.agent-desk.working {
  border-color:var(--accent);
  box-shadow: 0 0 20px var(--working-glow);
  animation:desk-pulse 2s ease-in-out infinite;
}
.agent-desk.done { border-color:var(--success); box-shadow:0 0 15px var(--success-glow); }
@keyframes desk-pulse {
  0%,100%{box-shadow:0 0 15px var(--working-glow)} 50%{box-shadow:0 0 30px var(--working-glow)}
}

/* Status dot */
.status-dot {
  position:absolute; top:12px; right:12px;
  width:10px; height:10px; border-radius:50%;
  background:var(--text-dim);
}
.status-dot.working { background:var(--accent); animation:dot-blink 1s infinite; }
.status-dot.done { background:var(--success); }
@keyframes dot-blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Character Container */
.char-container {
  display:flex; align-items:center; gap:12px; margin-bottom:10px;
}

/* Character SVG */
.char-svg { width:48px; height:48px; flex-shrink:0; }
.char-svg.working { animation:char-bounce 0.8s ease infinite; }
@keyframes char-bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.char-svg.idle { opacity:0.5; filter:grayscale(0.4); }
.char-svg.done .checkmark-overlay { display:block; }

.agent-name { font-size:12px; font-weight:700; line-height:1.3; }
.agent-role { font-size:10px; color:var(--text-dim); margin-top:2px; }

/* Speech Bubble */
.speech-bubble {
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  padding:8px 10px; font-size:10px; color:var(--accent-light);
  margin-top:8px; position:relative; display:none; line-height:1.4;
}
.speech-bubble::before {
  content:''; position:absolute; top:-6px; left:16px;
  border-left:6px solid transparent; border-right:6px solid transparent;
  border-bottom:6px solid var(--border);
}
.speech-bubble.visible { display:block; }

/* Status Badge */
.agent-badge {
  display:inline-block; font-size:9px; font-weight:600;
  padding:3px 8px; border-radius:4px; margin-top:6px; text-transform:uppercase;
  letter-spacing:0.5px;
}
.agent-badge.idle { background:rgba(139,143,163,0.15); color:var(--text-dim); }
.agent-badge.working { background:rgba(108,92,231,0.2); color:var(--accent-light); }
.agent-badge.done { background:rgba(0,184,148,0.2); color:var(--success); }

/* ── Repo Map ── */
.repo-map-section {
  padding:16px 20px; border-top:1px solid var(--border);
  background:var(--bg-card); border-radius:0 0 16px 16px;
  margin-top:16px;
}
.repo-map-section h3 {
  font-size:12px; color:var(--text-dim); font-weight:600; margin-bottom:12px;
  text-transform:uppercase; letter-spacing:0.8px;
}
.repo-grid { display:flex; flex-wrap:wrap; gap:8px; }
.repo-card {
  background:var(--bg-elevated); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px; min-width:140px; max-width:200px;
  transition:all 0.2s; cursor:default; flex:1;
}
.repo-card:hover { border-color:var(--accent); transform:translateY(-1px); }
.repo-card.affected { border-color:var(--warning); background:rgba(253,203,110,0.06); }
.repo-name { font-size:11px; font-weight:600; margin-bottom:4px; display:flex; align-items:center; gap:4px; }
.repo-name .lang-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.repo-detail { font-size:9px; color:var(--text-dim); line-height:1.4; }
.repo-affected-tag {
  font-size:8px; background:rgba(253,203,110,0.2); color:var(--warning);
  padding:2px 6px; border-radius:3px; display:inline-block; margin-top:4px;
  font-weight:600; text-transform:uppercase;
}
.repo-deps {
  margin-top:10px; display:flex; flex-wrap:wrap; gap:4px;
}
.dep-arrow {
  font-size:9px; color:var(--text-dim); background:var(--bg);
  padding:2px 8px; border-radius:4px; border:1px solid var(--border);
  white-space:nowrap;
}

/* ── Right Panel ── */
.right-panel {
  background:var(--bg-card); border-left:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}

/* Board Section */
.board-section { padding:16px; flex:1; overflow-y:auto; }
.board-section h3 {
  font-size:12px; color:var(--text-dim); font-weight:600; margin-bottom:12px;
  text-transform:uppercase; letter-spacing:0.8px;
}

/* Task List */
.task-list { display:flex; flex-direction:column; gap:6px; }
.task-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:8px;
  background:var(--bg-elevated); border:1px solid transparent;
  transition:all 0.2s;
}
.task-item.in_progress { border-color:var(--accent); background:rgba(108,92,231,0.08); }
.task-item.completed { opacity:0.6; }

.task-icon {
  width:22px; height:22px; border-radius:6px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:11px;
}
.task-icon.pending { background:rgba(139,143,163,0.15); color:var(--text-dim); }
.task-icon.in_progress { background:var(--accent); color:white; }
.task-icon.completed { background:var(--success); color:white; }

.task-info { flex:1; min-width:0; }
.task-title { font-size:11px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.task-agent { font-size:9px; color:var(--text-dim); margin-top:2px; }

/* Log Section */
.log-section {
  border-top:1px solid var(--border); padding:12px 16px;
  max-height:200px; overflow-y:auto;
}
.log-section h3 {
  font-size:11px; color:var(--text-dim); font-weight:600;
  margin-bottom:8px; text-transform:uppercase; letter-spacing:0.8px;
}
.log-entry {
  font-family:'JetBrains Mono',monospace; font-size:10px;
  padding:3px 0; color:var(--text-dim); border-bottom:1px solid rgba(46,50,71,0.5);
}
.log-time { color:var(--success); margin-right:8px; }
.log-msg { color:var(--text); }

/* ── Character Select Modal ── */
.modal-overlay {
  position:fixed; top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
  z-index:1000; display:none; align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:16px; padding:24px; max-width:600px; width:90%;
  max-height:80vh; overflow-y:auto;
}
.modal h2 { font-size:16px; margin-bottom:4px; }
.modal .modal-sub { font-size:12px; color:var(--text-dim); margin-bottom:20px; }
.modal-close {
  position:absolute; top:16px; right:16px; background:none; border:none;
  color:var(--text-dim); font-size:20px; cursor:pointer;
}
.char-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
}
.char-option {
  background:var(--bg-elevated); border:2px solid var(--border);
  border-radius:12px; padding:12px; text-align:center; cursor:pointer;
  transition:all 0.2s;
}
.char-option:hover { border-color:var(--accent); transform:scale(1.05); }
.char-option.selected { border-color:var(--accent); background:rgba(108,92,231,0.15); }
.char-option svg { width:48px; height:48px; margin:0 auto 8px; display:block; }
.char-option-name { font-size:10px; font-weight:600; }

/* Responsive */
@media(max-width:900px) {
  .main{grid-template-columns:1fr}
  .right-panel{border-left:none;border-top:1px solid var(--border)}
  .desk-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:500px) { .desk-grid{grid-template-columns:1fr} }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">A</div>
    <div>
      <h1>Agile SDLC Crew</h1>
      <div class="sub">Modern Office Sprint Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <span class="header-badge" id="workItemBadge">WI #---</span>
    <span class="header-time" id="headerTime">--:--:--</span>
    <button class="settings-btn" onclick="openCharSelect()">Karakterleri Sec</button>
  </div>
</header>

<div class="progress-section">
  <div class="progress-label" id="progressLabel">0/9 gorev</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressFill" style="width:0%"></div>
    </div>
  </div>
  <div class="progress-pct" id="progressPct">0%</div>
</div>

<div class="main">
  <!-- Office Scene -->
  <div class="office-scene">
    <h2>Ofis Gorunumu</h2>
    <div class="office-floor">
      <div class="desk-grid" id="deskGrid"></div>
    </div>

    <!-- Repo Map -->
    <div class="repo-map-section" id="repoMapSection" style="display:none">
      <h3>Repo Haritasi</h3>
      <div class="repo-grid" id="repoGrid"></div>
      <div class="repo-deps" id="repoDeps"></div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="board-section">
      <h3>Sprint Board</h3>
      <div class="task-list" id="taskList"></div>
    </div>
    <div class="log-section">
      <h3>Aktivite Logu</h3>
      <div id="logContainer">
        <div class="log-entry"><span class="log-time">[--:--]</span><span class="log-msg">Bekleniyor...</span></div>
      </div>
    </div>
  </div>
</div>

<!-- Character Select Modal -->
<div class="modal-overlay" id="charModal">
  <div class="modal">
    <h2>Karakter Secimi</h2>
    <div class="modal-sub">Her ajan icin bir karakter secin. Secim otomatik kaydedilir.</div>
    <div id="charSelectContent"></div>
    <div style="text-align:right;margin-top:16px">
      <button class="settings-btn" onclick="closeCharSelect()" style="padding:8px 24px">Tamam</button>
    </div>
  </div>
</div>

<script>
// ── Character Library ──
const CHARACTERS = {
  // People
  man_laptop: { name:'Laptoplu Adam', svg:`<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="12" r="8" fill="#fbbf24"/><rect x="14" y="22" width="20" height="16" rx="4" fill="#6c5ce7"/><rect x="10" y="34" width="28" height="6" rx="2" fill="#4a4e69"/><rect x="16" y="36" width="16" height="3" rx="1" fill="#74b9ff"/><circle cx="20" cy="10" r="1.5" fill="#2d3436"/><circle cx="28" cy="10" r="1.5" fill="#2d3436"/><path d="M21 14 Q24 17 27 14" stroke="#2d3436" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>` },
  woman_chart: { name:'Grafikli Kadin', svg:`<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="12" r="8" fill="#fd79a8"/><path d="M16 6 Q24 2 32 6" stroke="#e17055" stroke-width="3" fill="none"/><rect x="14" y="22" width="20" height="16" rx="4" fill="#00b894"/><rect x="32" y="26" width="10" height="8" rx="1" fill="#dfe6e9"/><rect x="34" y="28" width="2" height="4" fill="#6c5ce7"/><rect x="37" y="30" width="2" height="2" fill="#e17055"/><rect x="40" y="27" width="1" height="5" fill="#00b894"/><circle cx="20" cy="10" r="1.5" fill="#2d3436"/><circle cx="28" cy="10" r="1.5" fill="#2d3436"/></svg>` },
  man_coffee: { name:'Kahveli Adam', svg:`<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="12" r="8" fill="#74b9ff"/><rect x="14" y="22" width="20" height="16" rx="4" fill="#2d3436"/><rect x="32" y="28" width="8" height="6" rx="2" fill="#e17055"/><path d="M40 30 Q44 30 44 33 Q44 36 40 36" stroke="#e17055" stroke-width="1.5" fill="none"/><path d="M34 27 Q36 24 38 27" stroke="#b2bec3" stroke-width="1" fill="none" opacity="0.6"/><circle cx="20" cy="10" r="1.5" fill="#2d3436"/><circle cx="28" cy="10" r="1.5" fill="#2d3436"/><rect x="18" y="4" width="12" height="3" rx="1.5" fill="#636e72"/></svg>` },
  woman_glasses: { name:'Gozluklu Kadin', svg:`<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="12" r="8" fill="#fdcb6e"/><path d="M16 5 Q24 1 32 5" stroke="#e17055" stroke-width="2.5" fill="none"/><rect x="17" y="8" width="5" height="4" rx="2" stroke="#2d3436" stroke-width="1.5" fill="none"/><rect x="26" y="8" width="5" height="4" rx="2" stroke="#2d3436" stroke-width="1.5" fill="none"/><line x1="22" y1="10" x2="26" y2="10" stroke="#2d3436" stroke-width="1"/><rect x="14" y="22" width="20" height="16" rx="4" fill="#e17055"/><circle cx="20" cy="10" r="1" fill="#2d3436"/><circle cx="28" cy="10" r="1" fill="#2d3436"/></svg>` },
  man_tie: { name:'Kravatli Adam', svg:`<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="12" r="8" fill="#dfe6e9"/><rect x="14" y="22" width="20" height="16" rx="4" fill="#2d3436"/><polygon points="24,23 22,30 24,38 26,30" fill="#e17055"/><circle cx="20" cy="10" r="1.5" fill="#2d3436"/><circle cx="28" cy="10" r="1.5" fill="#2d3436"/><path d="M21 14 Q24 16 27 14" stroke="#2d3436" stroke-width="1" fill="none"/><rect x="16" y="3" width="16" height="5" rx="2" fill="#636e72"/></svg>` },
  woman_headset: { name:'Kulaklikh Kadin', svg:`<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="12" r="8" fill="#a29bfe"/><path d="M14 10 Q14 4 24 4 Q34 4 34 10" stroke="#636e72" stroke-width="2.5" fill="none"/><circle cx="14" cy="12" r="3" fill="#636e72"/><circle cx="34" cy="12" r="3" fill="#636e72"/><rect x="14" y="22" width="20" height="16" rx="4" fill="#0984e3"/><circle cx="20" cy="10" r="1.5" fill="#2d3436"/><circle cx="28" cy="10" r="1.5" fill="#2d3436"/></svg>` },
  robot: { name:'Robot', svg:`<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="14" y="8" width="20" height="16" rx="4" fill="#636e72"/><rect x="18" y="12" width="4" height="4" rx="1" fill="#74b9ff"/><rect x="26" y="12" width="4" height="4" rx="1" fill="#74b9ff"/><rect x="20" y="18" width="8" height="2" rx="1" fill="#b2bec3"/><line x1="24" y1="2" x2="24" y2="8" stroke="#636e72" stroke-width="2"/><circle cx="24" cy="2" r="2" fill="#e17055"/><rect x="12" y="26" width="24" height="14" rx="4" fill="#2d3436"/><rect x="16" y="29" width="4" height="4" rx="1" fill="#6c5ce7"/><rect x="22" y="29" width="4" height="4" rx="1" fill="#00b894"/><rect x="28" y="29" width="4" height="4" rx="1" fill="#e17055"/></svg>` },
  ninja: { name:'Ninja', svg:`<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="12" r="8" fill="#2d3436"/><rect x="16" y="9" width="16" height="4" rx="1" fill="#636e72"/><circle cx="20" cy="11" r="1.5" fill="#fff"/><circle cx="28" cy="11" r="1.5" fill="#fff"/><rect x="14" y="22" width="20" height="16" rx="4" fill="#2d3436"/><path d="M10 28 L14 26 L14 32 Z" fill="#636e72"/><path d="M38 28 L34 26 L34 32 Z" fill="#636e72"/></svg>` },
};

const DEFAULT_CHARS = {
  scrum_master: 'man_tie',
  business_analyst: 'woman_chart',
  software_architect: 'woman_glasses',
  senior_developer: 'man_laptop',
  qa_engineer: 'robot',
  uat_specialist: 'woman_headset',
};

const AGENT_DISPLAY = {
  scrum_master: { name:'Scrum Master', role:'PMP & Agile Scrum Master' },
  business_analyst: { name:'Is Analisti', role:'Gereksinim Muhendisi' },
  software_architect: { name:'Yazilim Mimari', role:'Sistem Tasarimcisi' },
  senior_developer: { name:'Sr. Developer', role:'Full-Stack Gelistirici' },
  qa_engineer: { name:'QA Muhendisi', role:'Test Engineer' },
  uat_specialist: { name:'UAT Uzmani', role:'Kabul Testi' },
};

const AGENT_ORDER = ['scrum_master','business_analyst','software_architect','senior_developer','qa_engineer','uat_specialist'];

// Load saved character selections
let charSelections = JSON.parse(localStorage.getItem('agile_chars') || 'null') || {...DEFAULT_CHARS};

// ── Render Functions ──
function getCharSvg(agentKey, statusClass) {
  const charKey = charSelections[agentKey] || DEFAULT_CHARS[agentKey];
  const char = CHARACTERS[charKey];
  return char ? char.svg : CHARACTERS.man_laptop.svg;
}

function renderDesks(data) {
  const grid = document.getElementById('deskGrid');
  let html = '';
  for (const key of AGENT_ORDER) {
    const agent = data?.agents?.[key];
    const status = agent?.status || 'idle';
    const statusClass = status === 'working' ? 'working' : (status === 'completed' ? 'done' : '');
    const charSvgClass = status === 'working' ? 'working' : (status === 'idle' ? 'idle' : 'done');
    const display = AGENT_DISPLAY[key];
    const badgeLabel = {idle:'Bekliyor',working:'Calisiyor',completed:'Tamamlandi'}[status]||status;
    const badgeClass = status === 'working' ? 'working' : (status === 'completed' ? 'done' : 'idle');

    html += `
      <div class="agent-desk ${statusClass}" ondblclick="openCharSelectFor('${key}')">
        <div class="status-dot ${statusClass}"></div>
        <div class="char-container">
          <div class="char-svg ${charSvgClass}">${getCharSvg(key, charSvgClass)}</div>
          <div>
            <div class="agent-name">${display.name}</div>
            <div class="agent-role">${display.role}</div>
            <div class="agent-badge ${badgeClass}">${badgeLabel}</div>
          </div>
        </div>
        <div class="speech-bubble ${agent?.current_task ? 'visible' : ''}">${agent?.current_task || ''}</div>
      </div>`;
  }
  grid.innerHTML = html;
}

function renderTasks(tasks) {
  const list = document.getElementById('taskList');
  if (!tasks || !tasks.length) { list.innerHTML='<div style="font-size:11px;color:var(--text-dim);padding:12px">Gorev bekleniyor...</div>'; return; }
  let html = '';
  for (const t of tasks) {
    const icon = t.status==='completed' ? '&#10003;' : (t.status==='in_progress' ? '&#9654;' : '&#9679;');
    const agentName = AGENT_DISPLAY[t.agent]?.name || t.agent;
    html += `
      <div class="task-item ${t.status}">
        <div class="task-icon ${t.status}">${icon}</div>
        <div class="task-info">
          <div class="task-title">${t.name}</div>
          <div class="task-agent">${agentName}</div>
        </div>
      </div>`;
  }
  list.innerHTML = html;
}

function renderLog(log) {
  const container = document.getElementById('logContainer');
  if (!log || !log.length) return;
  let html = '';
  for (const e of log) {
    html += `<div class="log-entry"><span class="log-time">[${e.time}]</span> <span class="log-msg">${e.message}</span></div>`;
  }
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

// Language color mapping
const LANG_COLORS = {
  'C#':     '#178600', 'csharp': '#178600', '.NET': '#178600',
  'Java':   '#b07219', 'Kotlin': '#A97BFF',
  'Python': '#3572A5', 'Flask':  '#3572A5', 'Django': '#3572A5',
  'JavaScript': '#f1e05a', 'TypeScript': '#3178c6', 'React': '#61dafb',
  'Go':     '#00ADD8', 'Rust':   '#dea584', 'Ruby':  '#701516',
  'PHP':    '#4F5D95', 'Swift':  '#F05138', 'Dart':  '#00B4AB',
  'SQL':    '#e38c00', 'Shell':  '#89e051', 'Docker': '#384d54',
  'unknown':'#636e72',
};

function renderRepoMap(repoMap) {
  const section = document.getElementById('repoMapSection');
  const grid = document.getElementById('repoGrid');
  const deps = document.getElementById('repoDeps');

  if (!repoMap || (!repoMap.repos && !repoMap.dependencies)) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  let html = '';

  if (repoMap.repos) {
    for (const repo of repoMap.repos) {
      const langColor = LANG_COLORS[repo.language] || LANG_COLORS.unknown;
      const isAffected = repo.affected ? 'affected' : '';
      html += `
        <div class="repo-card ${isAffected}">
          <div class="repo-name">
            <span class="lang-dot" style="background:${langColor}"></span>
            ${repo.name || '?'}
          </div>
          <div class="repo-detail">
            ${repo.language || '?'} ${repo.framework ? '/ '+repo.framework : ''}
            <br>${repo.purpose || ''}
          </div>
          ${repo.affected ? '<div class="repo-affected-tag">Etkilenen</div>' : ''}
        </div>`;
    }
  }
  grid.innerHTML = html;

  // Dependencies
  let depHtml = '';
  if (repoMap.dependencies) {
    for (const dep of repoMap.dependencies) {
      depHtml += `<span class="dep-arrow">${dep.from} → ${dep.to} (${dep.type || 'api'})</span>`;
    }
  }
  deps.innerHTML = depHtml;
}

function updateDashboard(data) {
  document.getElementById('workItemBadge').textContent = `WI #${data.work_item_id||'---'}`;
  const p = data.progress || {completed:0,total:9};
  const pct = Math.round((p.completed/p.total)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${p.completed}/${p.total} gorev`;
  document.getElementById('progressPct').textContent = pct+'%';
  renderDesks(data);
  renderTasks(data.tasks);
  renderLog(data.log);
  renderRepoMap(data.repo_map);
}

// ── Character Selection ──
let selectingFor = null;

function openCharSelect() {
  const content = document.getElementById('charSelectContent');
  let html = '';
  for (const agentKey of AGENT_ORDER) {
    const display = AGENT_DISPLAY[agentKey];
    html += `<div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:600;margin-bottom:8px">${display.name} <span style="color:var(--text-dim);font-weight:400">${display.role}</span></div>
      <div class="char-grid">`;
    for (const [charKey, char] of Object.entries(CHARACTERS)) {
      const selected = charSelections[agentKey] === charKey ? 'selected' : '';
      html += `<div class="char-option ${selected}" onclick="selectChar('${agentKey}','${charKey}',this)">
        ${char.svg}
        <div class="char-option-name">${char.name}</div>
      </div>`;
    }
    html += `</div></div>`;
  }
  content.innerHTML = html;
  document.getElementById('charModal').classList.add('open');
}

function openCharSelectFor(agentKey) {
  selectingFor = agentKey;
  openCharSelect();
}

function closeCharSelect() {
  document.getElementById('charModal').classList.remove('open');
  selectingFor = null;
  renderDesks(lastData);
}

function selectChar(agentKey, charKey, el) {
  charSelections[agentKey] = charKey;
  localStorage.setItem('agile_chars', JSON.stringify(charSelections));
  // Update UI
  const parent = el.closest('.char-grid');
  parent.querySelectorAll('.char-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

// ── Clock ──
function updateClock() {
  const now = new Date();
  document.getElementById('headerTime').textContent = now.toLocaleTimeString('tr-TR');
}
setInterval(updateClock, 1000);
updateClock();

// ── Polling ──
let lastData = {agents:{},tasks:[],progress:{completed:0,total:11},log:[],repo_map:null};

// Initialize with default empty state
renderDesks(lastData);

async function fetchStatus() {
  try {
    const r = await fetch('/status.json?t='+Date.now());
    if (r.ok) { lastData = await r.json(); updateDashboard(lastData); }
  } catch(e) {}
}
setInterval(fetchStatus, 2000);
fetchStatus();
</script>
