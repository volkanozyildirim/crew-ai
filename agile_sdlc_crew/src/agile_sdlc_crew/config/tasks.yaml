# ══════════════════════════════════════════════════════════════
# FAZ 0: Kickoff - Sanal Odak Grup (Design Review Simulasyonu)
# ══════════════════════════════════════════════════════════════

kickoff_sm_open_task:
  description: >
    GOREV: #{work_item_id} is kalemi icin "Sanal Odak Grup" toplantisini ac.
    Moderator olarak toplantıyı yönet.

    "get_work_item" aracını kullanarak is kalemini oku.
    Is kalemini ekibe sun: baslik, aciklama, kabul kriterleri ve yorumlar.
    Yorumlar varsa mutlaka dahil et — ek bagiam, karar gecmisi veya degisiklik
    talepleri icerebilir.

    TOPLANTI YAPISI:
    Bu toplantıda 4 uzman kendi perspektifinden 3 kritik soru/endise dile getirecek,
    ardindan birbirlerinin görüşlerine yanıt verecek.
    Son olarak bir "Kritik Tasarim Gozden Gecirme" tutanagi hazırlanacak.

    UZMANLAR:
    - Analist (Deniz): İş kuralları, mantıksal boşluklar, kullanıcı deneyimi — belirsizliği sevmez
    - Developer (Baris): Nasil kodlanir, karmasiklik, teknoloji uyumu, teknik borc riski
    - Team Lead (Can): Zaman cizelgesi, ekip kapasitesi, diger sistemlerle entegrasyon — pragmatik dengeleyici
    - QA/Tester (Ece): Hata senaryolari, "bu sistem nerede patlar?", nasil test edilir

    ONCEKI BAGLAM:
    {previous_context}
  expected_output: >
    ## Sanal Odak Grup — Acilis

    **Is Kalemi:** #{work_item_id}
    **Baslik:** [baslik]
    **Ozet:** [1-2 cumle]
    **Mevcut Kabul Kriterleri:** [WI'den okunan liste, eksikse "Tanimsiz"]
    **Yorumlar:** [varsa yazar + icerik, yoksa "Yorum yok"]
    **Toplanti Gundem:** Uzmanlar sira ile 3 kritik soru/endise paylaşacak, ardindan cros-tartisma yapilacak.
  agent: scrum_master

kickoff_ba_task:
  description: >
    GOREV: Analist (Deniz) perspektifini ustlen. Odak grup toplantisina katki ver.

    Is kurallarına, mantıksal boşluklara ve kullanıcı deneyimine odaklan.
    Belirsizliği sevmezsin — her muğlak noktayı işaretle.

    IS BILGISI VE BAGLAM:
    {previous_context}

    ADIM 1 — 3 KRİTİK SORU / ENDİŞE (Deniz olarak):
    Yukaridaki is bilgilerine gore seni en cok endişelendiren 3 noktayı dile getir:
    a) Hangi iş kuralı net değil veya eksik? (Örn: "X durumunda Y mi yapılacak Z mi?")
    b) Hangi mantıksal boşluk var? (Örn: "Edge case'ler tanımlanmamış")
    c) Kullanıcı deneyimi nasıl etkilenecek? Geriye dönük uyumluluk?

    ADIM 2 — WI'DEN CEVAPLANABİLEN NOKTALARI YANIT:
    Her soruyu yukaridaki is bilgilerine dayanarak yanıtla. Yanıtlanamayan → "ACIK SORU" işaretle.

    ADIM 3 — KABUL KRİTERLERİNİ DOĞRULA:
    Yukaridaki kabul kriterleri ölçülebilir ve test edilebilir mi?
    Eksik veya muğlak kriter varsa net, somut hale getir ve öner.

    IS KALEMI: #{work_item_id}
  expected_output: >
    ## Analist (Deniz) — Perspektif

    **3 Kritik Soru/Endişe:**
    1. [Endişe] — [WI'den cevap veya "AÇIK SORU"]
    2. [Endişe] — [WI'den cevap veya "AÇIK SORU"]
    3. [Endişe] — [WI'den cevap veya "AÇIK SORU"]

    **Kabul Kriterlerine Deniz'in Değerlendirmesi:**
    - [Kriter 1]: Ölçülebilir / Muğlak — [öneri]
    - [Kriter 2]: Ölçülebilir / Muğlak — [öneri]

    **Açık Kalan Sorular:** [liste veya "Yok"]
    **Önerilen Ek Kabul Kriterleri:** [liste veya "Yok"]
  agent: business_analyst

kickoff_arch_task:
  description: >
    GOREV: Team Lead (Can) perspektifini ustlen. Odak gruba katki ver.

    IS BILGISI VE BAGLAM:
    {previous_context}

    Zaman cizelgesi, ekip kapasitesi ve diger sistemlerle entegrasyon risklerine bak.
    Pragmatik bir dengeleyicisin — ideali değil, uygulanabiliri savunursun.

    ## ÇIKTI DİSİPLİNİ (zorunlu — ihlal edersen retry alirsin)
    - **Bütçe**: toplam çıktı ~2000 karakteri geçmesin. Dolgu/açılış cümleleri
      YASAK ("Genel olarak…", "Bu durumda…", "Söyleyebilirim ki…" yazma).
    - **Form**: paragraf yerine **bullet/madde** tercih et. Her madde tek
      cümle.
    - **Kapanış**: tüm `**bold**` etiketleri eşleşik kapansın. Numaralı liste
      ortada bırakılmasın. Son karakter nokta olsun.
    - **Eksiksizlik**: format alanlarının HEPSİ dolu olmalı. Bir bölümü
      yarım bırakacaksan onu kısalt — ASLA atlama. Özellikle "Entegrasyon
      Riskleri" ve "Kapsam Sınırı Önerisi" alanları sona yazıldığı için
      bunlara yer ayır.

    ## ADIMLAR

    ADIM 1 — Analist'in Endişelerini Yanıtla (max 4 madde, her biri 1 cümle):
    Deniz'in açık sorularına Team Lead perspektifinden onay/abartı ayrımıyla
    kısa yanıt ver.

    ADIM 2 — 3 KRİTİK SORU/ENDİŞE (her biri 1 cümle):
    a) Hangi mevcut sistem/modül etkilenecek? Entegrasyon riski nerede?
    b) Hangi başka ekibe/servise bağımlı? Koordinasyon gerekiyor mu?
    c) Scope creep riski var mı?

    ADIM 3 — TAHMINI REPO/MODÜL (max 3 madde):
    Context'teki HEDEF REPO ve dosya yapısına dayanarak modül/dosya seviyesinde
    belirt. Spekülasyon yapma — emin değilsen "Belirsiz" yaz.

    IS KALEMI: #{work_item_id}
  expected_output: >
    ## Team Lead (Can) — Perspektif

    **Deniz'in Endişelerine Yanıt:**
    - [soru 1]: [onay/abartı + tek cümle]
    - [soru 2]: [onay/abartı + tek cümle]

    **3 Kritik Soru/Endişe:**
    1. [entegrasyon riski — tek cümle]
    2. [koordinasyon — tek cümle]
    3. [scope — tek cümle]

    **Tahmini Etkilenen Repo/Modül:** [isim/path veya "Belirsiz"]
    **Entegrasyon Riskleri:**
    - [risk 1 — tek cümle]
    - [risk 2 — tek cümle]
    **Kapsam Sınırı Önerisi:** [tek cümle net sınır]
  agent: software_architect

kickoff_dev_task:
  description: >
    GOREV: Developer (Baris) perspektifini ustlen. Odak gruba katki ver.

    IS BILGISI VE BAGLAM:
    {previous_context}

    "Nasıl kodlarız?" diye bakarsın. Karmaşıklık, teknoloji uyumu ve teknik borç
    yaratma riskine odaklanırsın.

    ## ÇIKTI DİSİPLİNİ (zorunlu — ihlal edersen retry alirsin)
    - **Bütçe**: toplam çıktı ~2000 karakteri geçmesin. Dolgu/açılış cümleleri
      YASAK. Diğer uzmanlara yanıt verirken uzun yorum yapma, tek cümle yeter.
    - **Form**: paragraf yerine **bullet/madde**. Her madde tek cümle.
    - **Kapanış**: tüm `**bold**` etiketleri kapansın. Numaralı liste ortada
      bırakılmasın. Son karakter nokta olsun.
    - **Eksiksizlik**: format alanlarının HEPSİ dolu olmalı. Geçmişte
      "Karmaşıklık", "Dikkat Edilmesi Gereken Kod Noktaları" ve "Önerilen
      Teknik Yaklaşım" alanları sona yazıldığı için kesiliyordu — bunlara
      YETERLİ yer ayır. Bir bölümü yarım bırakacaksan onu kısalt, atlama.

    ## ADIMLAR

    ADIM 1 — Analist ve Team Lead'in Endişelerini Yanıtla (max 4 madde):
    Deniz ve Can'a Developer gözünden TEK cümle ile yanıt. Teknik açıdan
    doğrulanan, yanlış anlanan veya daha riskli bulduklarınla işaretle.

    ADIM 2 — 3 KRİTİK SORU/ENDİŞE (her biri 1 cümle):
    a) Mevcut kod tabanıyla uyumlu mu? Yeniden yazma riski var mı?
    b) Hangi edge case'ler kodda zorunlu? (null/race/event-order vs.)
    c) Teknik borç riski + hangi kısayollardan kaçınmalıyız?

    ADIM 3 — KARMAŞıKLıK + KOD HARİTASI + YAKLAŞIM (zorunlu, atlama):
    - Karmaşıklığı Düşük/Orta/Yüksek puanla, 1 cümle gerekçe.
    - 2-4 madde halinde dokunulacak dosya/fonksiyon ismi (somut path).
    - 3-5 maddelik somut teknik yaklaşım (uygulama adımları).

    IS KALEMI: #{work_item_id}
  expected_output: >
    ## Developer (Barış) — Perspektif

    **Deniz ve Can'a Yanıt:**
    - [nokta 1]: [tek cümle]
    - [nokta 2]: [tek cümle]

    **3 Kritik Soru/Endişe:**
    1. [kod uyumu/refactor riski — tek cümle]
    2. [edge case'ler — tek cümle]
    3. [teknik borç riski — tek cümle]

    **Karmaşıklık:** Düşük/Orta/Yüksek — [tek cümle gerekçe]

    **Dikkat Edilmesi Gereken Kod Noktaları:**
    - [dosya:fonksiyon 1]
    - [dosya:fonksiyon 2]
    - [dosya:fonksiyon 3]

    **Önerilen Teknik Yaklaşım:**
    1. [adım — tek cümle]
    2. [adım — tek cümle]
    3. [adım — tek cümle]
  agent: senior_developer

kickoff_qa_task:
  description: >
    GOREV: QA/Tester (Ece) perspektifini ustlen. Odak gruba katki ver.

    Hata senaryolarını düşünürsün. "Bu sistem nerede patlar?" ve "Nasıl test ederiz?"
    sorularını sorarsın.

    ADIM 1 — Tüm Ekibin Endişelerini Test Perspektifinden Değerlendir:
    Deniz'in mantıksal boşlukları, Can'ın entegrasyon riskleri ve Barış'ın edge
    case'leri QA gözünden nasıl görünüyor? Her birinin test edilebilirliği nedir?

    ADIM 2 — 3 KRİTİK SORU / ENDİŞE (Ece olarak):
    a) Hangi negatif senaryo (hata yolu) test edilmeden üretim riski oluşturur?
    b) Bu değişiklik mevcut özellikleri bozabilir mi? Regresyon riski nerede?
    c) Performans / yük testi gerekiyor mu? Hangi eşikler kritik?

    ADIM 3 — TEST SENARYOLARI:
    Geliştirilmesi gereken temel test senaryolarını listele (happy path + hata yolları).

    IS KALEMI: #{work_item_id}
  expected_output: >
    ## QA/Tester (Ece) — Perspektif

    **Ekibin Endişelerinin Test Edilebilirliği:**
    - Deniz'in [boşluk]: Test edilebilir / Test edilemez — [açıklama]
    - Can'ın [risk]: Test edilebilir / Test edilemez — [açıklama]
    - Barış'ın [edge case]: Test senaryosu: [açıklama]

    **3 Kritik Soru/Endişe:**
    1. [Kritik negatif senaryo]
    2. [Regresyon riski]
    3. [Performans/yük endişesi]

    **Temel Test Senaryoları:**
    - [ ] Happy path: [açıklama]
    - [ ] Hata yolu 1: [açıklama]
    - [ ] Hata yolu 2: [açıklama]
    - [ ] Edge case: [açıklama]

    **Regresyon Riski:** Düşük / Orta / Yüksek
  agent: qa_engineer

kickoff_uat_task:
  description: >
    GOREV: UAT Specialist olarak son kullanici kabulunu degerlendir.

    Tum ekibin perspektiflerini (Deniz/Can/Baris/Ece) dikkate alarak
    kullanici kabul testi acisindan degerlendirme yap.

    - Kabul kriterleri son kullanici perspektifinden test edilebilir mi?
    - Hangi kabul kriterleri "teknik dogru ama is hatasi" olarak gecilebilir?
    - Is kurali ihlali riski olan noktalari isaretla.

    IS KALEMI: #{work_item_id}
  expected_output: >
    ## UAT Perspektifi

    **Kabul Kriterlerinin Son Kullanici Degerlemesi:**
    - [Kriter 1]: UAT'ta test edilebilir / Edilemez — [aciklama]

    **Is Kurali Riskleri:** [liste veya "Yok"]
    **Son Kullanici Etkisi:** [aciklama]
  agent: uat_specialist

kickoff_sm_close_task:
  description: >
    GOREV: Odak grup toplantisini kapat. "Kritik Tasarim Gozden Gecirme" tutanagini hazirla.

    IS BILGISI VE BAGLAM:
    {previous_context}

    Tum uzmanların (Deniz/Can/Barış) katkılarını derle.
    Bu tutanak tüm pipeline boyunca tek referans kaynağı olacak.

    TUTANAK YAPISI (4 bölüm):

    1. TOPLANTI ÖZETİ
       Fikrin/değişikliğin genel uygulanabilirliği. Ekip konsensüsü. Kapsam sınırı.

    2. DİSİPLİN BAZLI ANALİZ
       Her uzmanın ana bulgusunu (1-2 madde) disiplin başlığı altında özetle:
       - Analiz (Deniz): İş kuralı/mantıksal bulgular
       - Yazılım (Barış): Teknik yaklaşım ve kodlama uyarıları
       - Yönetim (Can): Entegrasyon/kapsam kararları
       - Test: Diger uzmanlarin ciktilarina dayanarak kritik test senaryolari ve hata yollari

    3. KRİTİK RİSK TABLOSU
       Tüm ekibin dile getirdiği riskleri şu formatta listele:
       | Risk | Etki Seviyesi (Yüksek/Orta/Düşük) | Önerilen Önlem |

    4. BACKLOG ADAYLARI
       - Açık kalan sorular için kullanıcı hikayeleri veya teknik görevler
       - Kabul kriterleri listesi (nihai, net, ölçülebilir)
       - Teknik tasarımın kesinlikle ele alması gereken edge case'ler

    IS KALEMI: #{work_item_id}
  expected_output: >
    ## Kritik Tasarim Gozden Gecirme — Tutanak

    **Is Kalemi:** #{work_item_id}

    ### 1. Toplanti Ozeti
    [Genel uygulanabilirlik degerlendirmesi, ekip konsensüsü, kapsam siniri]

    ### 2. Disiplin Bazli Analiz
    **Analiz (Deniz):** [ana bulgular]
    **Yazilim (Baris):** [teknik yaklasim + uyarilar]
    **Yonetim (Can):** [entegrasyon/kapsam kararlari]
    **Test (Ece):** [kritik test senaryolari]

    ### 3. Kritik Risk Tablosu
    | Risk | Etki | Onlem |
    |------|------|-------|
    | [risk 1] | Yuksek/Orta/Dusuk | [onlem] |
    | [risk 2] | Yuksek/Orta/Dusuk | [onlem] |

    ### 4. Backlog Adaylari
    **Nihai Kabul Kriterleri:**
    - [ ] [Kriter 1 — olculebilir, test edilebilir]
    - [ ] [Kriter 2 — olculebilir, test edilebilir]

    **Teknik Tasarimin Ele Almasi Gereken Edge Case'ler:**
    - [edge case 1]
    - [edge case 2]

    **Acik Gorevler / Hikayeler:**
    - [varsa]

    *Tum takim #{work_item_id} is kalemine hazir.*
  agent: scrum_master

# ══════════════════════════════════════════════════════════════
# FAZ 0: Scrum Master - Repo Kesfetme ve Bagimlilik Analizi
# ══════════════════════════════════════════════════════════════

discover_repos_task:
  description: >
    GOREV: {work_item_id} is kalemi icin ilgili Azure DevOps repolarini kesfet.
    "list_repos" aracini kullanarak projedeki tum repolari listele.
    Is kalemindeki bilgilere dayanarak hangi repo(lar)da calisma yapilacagini belirle.

    ONCEKI ADIM CIKTILARI:
    {previous_context}
  expected_output: >
    Kesfedilen repolarin listesi ve is kalemi ile iliskili repo(lar)in adi.
  agent: software_architect

dependency_analysis_task:
  description: >
    GOREV: Belirlenen repo(lar)in yapisini incele.
    "browse_repo" aracini kullanarak dizin yapisini, ana dosyalari ve
    bagimliliklari (import, config dosyalari) analiz et.

    ONCEKI ADIM CIKTILARI:
    {previous_context}
  expected_output: >
    Repo yapisi ozeti, kullanilan dil/framework ve bagimlilik haritasi.
  agent: software_architect

# ══════════════════════════════════════════════════════════════
# FAZ 1: Is Analizi ve Teknik Tasarim
# ══════════════════════════════════════════════════════════════

requirements_analysis_task:
  description: >
    GOREV: {work_item_id} idli is kalemini analiz et ve yapilandirilmis JSON cikti uret.

    Context'te "WORK ITEM DETAYI" basligiyla is kalemi bilgisi hazir. Oku ve analiz et.
    get_work_item araci ile de okuyabilirsin — ama context'te varsa tekrar okuma.

    CALISMA AKISI:
    1. Is kaleminin baslik + aciklama + kabul kriterlerini oku
    2. Fonksiyonel gereksinimleri cikar (FR1, FR2, ...)
    3. Teknik gereksinimleri cikar (TR1, TR2, ...)
    4. Kabul kriterlerini numarala (AC1, AC2, ...)
    5. Kapsam disi maddeleri belirle
    6. Varsayimlari "ASSUMPTION:" ile isaretle
    7. Belirsiz noktalari open_questions'a ekle

    ONEMLI: Onceki bagiamda "Kickoff Toplantisi Ozeti" varsa dikkate al.
    PR yorumlari varsa onlari da gereksinimlere yansit.

    Her durumda analizi tamamla — eldeki bilgilerle devam et.

    {scrum_master_feedback}

    ONCEKI ADIM CIKTILARI:
    {previous_context}
  expected_output: >
    SADECE gecerli JSON dondur. Serbest metin YAZMA.

    ```json
    {
      "summary": "is kaleminin tek cumlede ozeti",
      "functional_requirements": [
        {"id": "FR1", "desc": "..."},
        {"id": "FR2", "desc": "..."}
      ],
      "technical_requirements": [
        {"id": "TR1", "desc": "..."}
      ],
      "acceptance_criteria": [
        {"id": "AC1", "desc": "..."},
        {"id": "AC2", "desc": "..."}
      ],
      "out_of_scope": ["..."],
      "assumptions": ["ASSUMPTION: ..."],
      "open_questions": ["..."]
    }
    ```

    KURALLAR:
    - Her FR/TR/AC benzersiz id alir
    - Description'da yer almayan sey UYDURMA
    - Eksik bilgiyi open_questions'a ekle
    - JSON disinda HICBIR metin yazma
  agent: business_analyst

technical_design_task:
  description: >
    GOREV: Azure DevOps is kalemi #{work_item_id} icin gelistirme plani olustur.

    ⚠️ KRITIK: Final ciktin MUTLAKA JSON plan olacak (work_item_id, repo_name,
    summary, changes[], acceptance_criteria alanlari ile). Tool cagrilarini
    TAMAMLADIKTAN SONRA, topladigin bilgilerle JSON uret. Tool cagrisi formatini
    asla "final answer" olarak yazma.

    🚨 YETERSIZLIK KONTROLU (kod yazma perspektifinden):
    Eger is kalemi YAZILIM GELISTIRME ICIN YETERSIZ ise, JSON yerine ciktinin
    en basina su marker'i yaz:

    YETERSIZ: <gelistirici icin eksik olan kritik bilgileri kisaca listele>

    YETERSIZ demen icin gecerli sebepler:
    - Hangi fonksiyonelite eklenecek/degisecek belirsiz (agent repo'yu inceledikten sonra bile)
    - Beklenen input/output, veri yapisi, API contract bilinmiyor
    - Degisecek dosyalarin tahmini bile mumkun degil
    - Kabul kriterleri test edilebilir halde degil (olçulemez)
    - Is kuralı veya flow tarif edilmemis (edge case'ler dahil)
    - Tool'larla arastirdigin halde yeterli teknik baglam bulamadin

    YETERSIZ DEGIL (bunlari tahmin/kesfet):
    - Repo adi: tool'larla keşfet
    - Tam dosya yolu: kod tabaninda ara
    - Kucuk belirsizlikler: en makul varsayimla devam et

    Eger YETERSIZ degilse DIREKT JSON uret, marker yazma.

    ⚡ MALİYET OPTIMIZASYONU — TOOL KULLANIMI:
    Context'te asagidaki bilgiler HAZIR:
    - "WORK ITEM DETAYI" basligi altinda: baslik, aciklama, kabul kriterleri
    - "DOSYA ICERIGI: /yol/dosya.php" basligiyla dosya icerikleri (varsa)
    - "Kickoff Toplantisi Ozeti" basligi altinda: takim analizi
    - "ONERILEN REPOLAR" basligi altinda: hedef repo

    KURAL: Context'te var olan bilgi icin HICBIR TOOL CAGIRMA.
    - get_work_item CAGIRMA — WI detayi zaten "WORK ITEM DETAYI" altinda
    - Dosya context'teyse browse_repo CAGIRMA — dosya icerigi zaten var
    - Repo biliniyorsa list_repos CAGIRMA

    Tool sadece context'te OLMAYAN bilgi icin kullan:
    - Context'te bulunmayan bir dosyayi okumak gerekiyorsa → browse_repo
    - Kod arama gerekiyorsa → search_code

    ADIM 1 - KABUL KRİTERLERİNİ ANLA:
    Context'te "Kabul Kriterleri" başlığı varsa oku ve not al.
    Bu kriterler BA tarafından belirlenmiş olup teknik planın HER birini karşılaması zorunludur.
    Planın `acceptance_criteria` JSON alanı bu listenin tam karşılığı olmalıdır.

    ADIM 2 - IS KALEMINI ANLA:
    Context'teki "WORK ITEM DETAYI" bolumunu oku. Asagidakileri belirle:
    - Hangi repository uzerinde calisilacak ("ONERILEN REPOLAR" veya aciklamadan)
    - Ne yapilmasi isteniyor (translate, refactor, yeni endpoint, fix vb.)
    - Hangi dosya/endpoint/route degisecek
    - Ornek dosya veya pattern referansi varsa not al

    ADIM 3 - DEGISECEK DOSYAYI BUL:
    Context'te "DOSYA ICERIGI: /yol/dosya.php" varsa onu kullan.
    YOKSA browse_repo ile hedef dosyayi bul ve oku.

    ADIM 4 - ORNEK DOSYAYI OKU (varsa, context'te yoksa):
    Description'da ornek dosya/pattern belirtilmisse ve context'te yoksa oku.
    Ornek dosyadaki pattern'i anla - ayni yapiyi hedef dosyaya uygulayacaksin.

    ADIM 5 - DEGISIKLIK PLANINI YAZ:
    Asagidaki JSON formatinda ciktini olustur.
    HER dosya icin mevcut kodu ve yeni kodu GOSTER.
    Tahminde bulunma - sadece okudugu kodlara dayali plan yaz.

    ONEMLI:
    - Sadece is kaleminde istenen degisiklikleri planla
    - Is kaleminde BELIRTILMEYEN dosyalara/modullere DOKUNMA
    - Her dosyayi MUTLAKA oku, tahminde bulunma
    - Ornek dosyadaki pattern'i hedef dosyaya uyarla, kopyalama

    {scrum_master_feedback}

    ONCEKI ADIM CIKTILARI:
    {previous_context}
  expected_output: >
    Ciktini KESINLIKLE asagidaki JSON formatinda ver.
    JSON disinda HICBIR ACIKLAMA YAZMA.

    ```json
    {
      "work_item_id": "{work_item_id}",
      "repo_name": "repository-adi",
      "summary": "is kaleminin tek cumlede ozeti",
      "changes": [
        {
          "file_path": "/tam/dosya/yolu.php",
          "change_type": "edit",
          "description": "Bu dosyada ne degisecek (tek cumle)",
          "current_code": "dosyadan okunan MEVCUT ilgili kod bolumu",
          "new_code": "uygulanmasi gereken YENI kod bolumu",
          "covers_requirements": ["FR1", "AC2"],
          "risk": "low"
        }
      ],
      "acceptance_criteria": [
        {"id": "AC1", "desc": "kriter 1"},
        {"id": "AC2", "desc": "kriter 2"}
      ],
      "alternatives_considered": [
        {"option": "...", "tradeoff": "...", "chosen": true}
      ],
      "breaking_changes": [],
      "migration_notes": "",
      "security_perf_notes": ""
    }
    ```

    KURALLAR:
    - current_code alani GERCEK dosyadan okunmus olmali, uydurmali degil
    - new_code alani derlenebilir/calisabilir olmali
    - Her change en az bir FR/TR/AC id'sine baglanmali (covers_requirements)
    - covers_requirements bos olan change YAZMA
    - Sadece is kaleminde istenen degisiklikleri icerir
    - acceptance_criteria BA ciktisindaki AC listesiyle uyumlu olmali
  agent: software_architect

# ══════════════════════════════════════════════════════════════
# FAZ 2: Developer - Kod Yazma
# ══════════════════════════════════════════════════════════════

implement_change_task:
  description: >
    GOREV: Asagidaki degisiklik planini BIREBIR uygula. Ciktin dosyanin
    DEGISIKLIK UYGULANMIS TAM HALI olacak — bastan sona her satir.

    ╔══════════════════════════════════════════════════════════════╗
    ║ KRITIK: TAM DOSYA SOZLESMESI                                 ║
    ║                                                              ║
    ║ Ciktinin tamami dogrudan dosyaya YAZILACAK. Push edildigi    ║
    ║ andan itibaren dosya = senin ciktin. Eksik bir karakter      ║
    ║ uretim sistemini KIRAR.                                      ║
    ║                                                              ║
    ║ ORIGINAL_LINES (orjinal dosya satir sayisi) -> NEW_LINES     ║
    ║ Kabul edilebilir aralik: NEW_LINES = ORIGINAL_LINES ± 30%    ║
    ║ Bu araligin disinda olan cikti push edilmeden REDDEDILIR ve  ║
    ║ Pipeline tekrar denemek zorunda kalir.                       ║
    ╚══════════════════════════════════════════════════════════════╝

    PLAN:
    Repo: {target_repo}
    Dosya: {target_file}
    Degisiklik: {change_description}

    TUM PLAN VE DIGER DOSYALAR (entegrasyon icin referans):
    {previous_context}

    MEVCUT KOD (planda belirtilen — dosyada bulunan blok):
    ```
    {current_code}
    ```

    YENI KOD (planda belirtilen — yukaridakinin yerine yazilacak blok):
    ```
    {new_code}
    ```

    ZORUNLU ADIMLAR (sirasi degistirilemez):

    ADIM 1 — DOSYAYI BASTAN SONA OKU:
    "browse_repo" araci ile {target_file} dosyasini oku. Dosyanin BIRINCI
    satirindan SON satirina kadar tam icerigi al. Orta dosya/large dosya
    olsa bile tamamini iste.

    ADIM 2 — DOSYAYI ZIHNINDE OLC:
    Okudugun dosyanin satir sayisini sayar gibi zihninde tut:
      ORIG_LINES = <orjinal dosya satir sayisi>
      Plan etkisi: +<eklenen> / -<silinen> satir
      EXPECTED_NEW_LINES = ORIG_LINES + ekleme - silme

    ADIM 3 — DEGISIKLIGI UYGULA:
    Plan'daki current_code blogunu dosyada bul, new_code ile degistir.
    Diger HICBIR satira dokunma — formatlama, naming, comment, import
    sirasi, whitespace HICBIRI degismez.

    ADIM 4 — TAM DOSYAYI DONDUR:
    Dosyanin BIRINCI satirindan (orn. PHP icin "<?php"), SON satirina kadar
    tum icerigi tek bir kod blogu olarak dondur. Hicbir kismini atlama.

    ADIM 5 — SELF-CHECK (cikti uretirken):
    Dondurmeden once kendine sor:
      [ ] Cikti dosyanin gercek ilk satiri ile mi basliyor? (orn: <?php)
      [ ] Cikti dosyanin gercek son satiri ile mi bitiyor?
      [ ] Cikti satir sayisi EXPECTED_NEW_LINES'a yakin mi?
      [ ] "..." veya "// (rest unchanged)" gibi kisaltma marker'i YOK mu?
      [ ] Plan disi degisiklik YOK mu?
    Herhangi bir cevap "HAYIR" ise CIKTIYI DONDURME — yeniden olustur.

    MUTLAK YASAKLAR:
    - "..." / "// kalan kod ayni" / "/* original code */" kisaltmalar
    - Sadece degisen metodu/fonksiyonu donmek (dosya birden fazla method
      iceriyorsa hepsini orijinal halde tekrar yaz)
    - Plan'da olmayan dosyalara dokunmak
    - Mevcut import'lari/namespace'leri silmek
    - Kod blogu disinda aciklama, "Iste guncel dosya:" gibi giris cumlesi
    - Dosyayi okumadan tahminle kod uretmek

    BUYUK DOSYA UYARISI (>500 satir):
    Dosya buyukse "tahminen aynisi" diye dusunup atlama. Orijinal kodu
    dikkatli copy + sadece plan'daki degisiklik. max_tokens limitin yeterli;
    yetmiyorsa yine tum dosyayi dondur, hata mesaji ile dur — KISMI cikti
    uretme.

  expected_output: >
    Dosyanin DEGISIKLIK UYGULANMIS TAMAMINI tek bir kod blogu icinde dondur.

    KESIN KURALLAR:
    - Cikti dosyanin BIRINCI satiri ile basliyor (orn. <?php, package main,
      from xyz import vb.)
    - Cikti dosyanin SON satiri ile bitiyor (kapanis tag, son fonksiyon
      kapanisi vb.)
    - Cikti satir sayisi orijinal dosya satir sayisinin %70-130'u arasinda
      (orjinal 1000 satir ise cikti 700-1300 arasi olmali)
    - Kod blogu disinda HICBIR METIN YAZMA — ne giris cumlesi, ne ozet,
      ne "burada degisiklikler:" tarzi aciklama
    - Markdown ``` opsiyonel ama tek bir kod blogu olmali

    Cikti formati:
    ```
    [dosyanin BIRINCI satiri]
    [...orijinal kodun degisiklik uygulanmis hali...]
    [dosyanin SON satiri]
    ```

    PIPELINE GUVENLIK KONTROLU: Cikti orijinalin %50'sinden kisa olursa
    push otomatik IPTAL edilir. Kisaltma uretirsen pipeline yeniden
    deneyecek; bu hem zaman hem maliyet kaybi.
  agent: senior_developer

# ══════════════════════════════════════════════════════════════
# FAZ 3: Review - PR Dogrulama
# ══════════════════════════════════════════════════════════════

review_pr_task:
  description: >
    GOREV: PR #{pr_id} degisikliklerinin is kalemiyle uyumunu ve kod kalitesini dogrula.

    IS KALEMI: #{work_item_id}
    IS GEREKSINIMLERI:
    {requirements}

    PR: {pr_url}
    Repo: {target_repo}

    ⚠️ KRITIK KARAR KURALI:
    - PR'daki degisiklikler is kalemindeki ISTEMLERLE BIREBIR eslesmiyorsa
      → KARAR: DEGISIKLIK GEREKLI
    - Plan'da 6 dosya degisecek ama PR'da 1 dosya varsa → DEGISIKLIK GEREKLI
    - PR'daki kod sadece yuzeysel (bir satir, bir alan) ve is kalemi koklu
      degisiklik isteyen bir is ise → DEGISIKLIK GEREKLI
    - Kabul kriterleri karsilanmamissa → DEGISIKLIK GEREKLI
    - Syntax hatasi, acik bug varsa → DEGISIKLIK GEREKLI

    Sahte ONAY verme — PR eksikse acikca belirt. Pipeline senin kararina gore durur.

    ADIMLARIN:
    1. "get_pr_changes" araci ile PR'daki degisen dosyalari listele
    2. Her degisen dosyayi "Repo Gezgini" ile oku (branch: {target_branch})
    3. Asagidaki kontrol listesini uygula:

    KABUL KRİTERLERİ KONTROL LİSTESİ (ÖNCE BU):
    Context'te "Kabul Kriterleri" başlığı varsa her birini tek tek kontrol et:
    - [ ] Her kabul kriteri PR'daki kodda karşılanmış mı?
    - [ ] Karşılanmayan kriter varsa → KARAR: DEGISIKLIK GEREKLI
    Bu kriterler BA ve teknik tasarım sürecinde belirlenmiş olup bağlayıcıdır.

    IS UYUMU KONTROL LISTESI:
    - [ ] PR sadece is kaleminde istenen dosyalari mi degistirmis?
    - [ ] Gereksiz/alakasiz dosya degisikligi var mi?
    - [ ] Is kalemindeki TUM gereksinimler karsilanmis mi?
    - [ ] Ornek pattern dogru uygulanmis mi?

    KOD KALITESI KONTROL LISTESI (SOLID & CLEAN CODE):
    - [ ] Single Responsibility: Her sinif/metod tek bir sorumluluga mi sahip?
    - [ ] Open/Closed: Degisiklik mevcut kodu bozmadan genisletme yapiyor mu?
    - [ ] Liskov Substitution: Alt siniflar ust siniflarin yerine gecebiliyor mu?
    - [ ] Interface Segregation: Gereksiz bagimlilik olusturulmus mu?
    - [ ] Dependency Inversion: Somut siniflara degil soyutlamalara mi bagli?
    - [ ] Naming conventions projenin mevcut konvansiyonlarina uygun mu?
    - [ ] Hata yonetimi (try-catch, null check, validation) yeterli mi?
    - [ ] Edge case'ler ele alinmis mi?
    - [ ] Gereksiz karmasiklik (over-engineering) var mi?
    - [ ] Performans etkisi (N+1 query, gereksiz dongu, buyuk bellek kullanimi) var mi?
    - [ ] Syntax hatasi veya eksik import var mi?

    4. Sonucu "add_pr_comment" araci ile PR'a yorum olarak ekle
    5. Ayrica is kalemine ({work_item_id}) yorum olarak da ekle

    {scrum_master_feedback}

    ONCEKI ADIM CIKTILARI:
    {previous_context}
  expected_output: >
    ## PR Review Sonucu

    **Karar:** ONAY / DEGISIKLIK GEREKLI

    **Kabul Kriterleri Kontrolü:**
    - [Kriter 1]: KARSILANDI / EKSİK - [açıklama]
    - [Kriter 2]: KARSILANDI / EKSİK - [açıklama]

    **Is Uyumu:**
    - Karsilanan gereksinimler: [liste]
    - Eksik gereksinimler: [liste veya "Yok"]

    **Kod Kalitesi (SOLID & Clean Code):**
    - SOLID uyumu: [degerlendirme]
    - Clean code: [degerlendirme]
    - Sorunlar: [liste veya "Sorun yok"]

    **Gereksiz Degisiklikler:**
    - [liste veya "Yok"]
  agent: code_reviewer

# ══════════════════════════════════════════════════════════════
# FAZ 4: Test ve Kalite Guvence
# ══════════════════════════════════════════════════════════════

test_planning_task:
  description: >
    GOREV: {work_item_id} is kalemi icin yapilan degisikliklerin test planini olustur.
    PR'daki degisiklikleri incele, {target_repo} reposundaki {target_branch} branch'ini oku.

    ONEMLI: Onceki baglamda "Kickoff Toplantisi Ozeti" varsa QA perspektifini dikkate al.
    Kickoff'ta QA mühendisi test senaryolarini ve regresyon riskini zaten degerlendirdi.
    O bulgulari baslangic noktasi olarak al, uzerine tamamla ve genis.

    Test planinda su bolumleri icermeli:
    - Basarili senaryolar (happy path)
    - Hata senaryolari (error cases)
    - Sinir degerleri (edge cases)
    - Entegrasyon test senaryolari
    - Mumkunse unit test kodu

    {scrum_master_feedback}

    ONCEKI ADIM CIKTILARI:
    {previous_context}
  expected_output: >
    Test plani: test senaryolari listesi, edge case'ler, onerilen unit test kodlari.
  agent: qa_engineer

uat_task:
  description: >
    GOREV: {work_item_id} is kalemi icin kullanici kabul testi yap.

    ADIM 0 - KABUL KRİTERLERİNİ HAZIRLA:
    Context'te "Kabul Kriterleri (Pipeline Boyunca Bagleyici)" başlığı varsa
    ORADAN AL — get_work_item çağırma, kriterler zaten belirlenmiş.
    Bu kriterler BA tarafından analiz aşamasında, teknik tasarımdan ÖNCE belirlendi
    ve tüm pipeline boyunca bağlayıcı tek kaynaktır.

    Context'te kabul kriteri yoksa "get_work_item" ile WI'yi oku ve çıkar.

    Kickoff Toplantısı Özeti varsa UAT perspektifini de dikkate al.

    ADIM 1 - PR DEGISIKLIKLERINI INCELE:
    "get_pr_changes" araci ile PR'daki degisiklikleri incele.
    Her degisikligin hangi kabul kriterine karsilik geldigini belirle.

    ADIM 2 - DEGERLENDIRME:
    Her kabul kriteri icin GECTI veya KALDI karari ver.
    KALDI olanlar icin ne eksik oldugunu acikla.

    {scrum_master_feedback}

    ONCEKI ADIM CIKTILARI:
    {previous_context}
  expected_output: >
    ## UAT Raporu

    **Kabul Kriterleri:**
    1. [Kriter] - GECTI/KALDI - [Aciklama]
    2. [Kriter] - GECTI/KALDI - [Aciklama]
    ...

    **Genel Degerlendirme:** KABUL / RED
    **Eksikler:** [liste veya "Yok"]
  agent: uat_specialist

# ══════════════════════════════════════════════════════════════
# FAZ 5: Tamamlanma Raporu
# ══════════════════════════════════════════════════════════════

completion_report_task:
  description: >
    GOREV: {work_item_id} is kalemi icin tamamlanma raporu olustur.
    Tum sureci ozetle: gereksinimler, yapilan degisiklikler, test sonuclari,
    UAT sonuclari ve PR bilgisi.
    Is kalemine yorum olarak ozet ekle.

    ONCEKI ADIM CIKTILARI:
    {previous_context}
  expected_output: >
    Tamamlanma raporu: is ozeti, degisiklik listesi, test sonuclari,
    UAT sonuclari, PR linki. Is kalemine yorum eklenmis olmali.
  agent: scrum_master

# ══════════════════════════════════════════════════════════════
# Scrum Master Review (her adim sonrasi kalite kontrolu)
# ══════════════════════════════════════════════════════════════

scrum_review_task:
  description: >
    GOREV: Asagidaki adimin ciktisini incele ve kalite kontrolu yap.

    ADIM: {step_name}
    IS KALEMI: #{work_item_id}

    ADIM CIKTISI:
    {step_output}

    DEGERLENDIRME KRITERLERI:
    - Cikti is kalemiyle uyumlu mu?
    - Cikti eksiksiz ve anlasilir mi?
    - Ciktida hatali veya tutarsiz bilgi var mi?
    - Cikti bir sonraki adim icin yeterli mi?

    Kararini ONAY veya IYILESTIR olarak belirt.
    IYILESTIR dersen, eksikleri ve somut iyilestirme onerilerini yaz.
  expected_output: >
    **Karar:** ONAY veya IYILESTIR

    **Degerlendirme:** [kisa aciklama]

    **Iyilestirme Onerileri (IYILESTIR ise):**
    - [somut oneri 1]
    - [somut oneri 2]
  agent: scrum_master
